plugins {
    id 'de.featjar.java-library'
    id 'de.featjar.java-application'
}

dependencies {
    api 'de.featjar:feature-model'
    api 'de.featjar:uvl'
    api testFixtures('de.featjar:formula')
}

license {
    ext {
        licence_url = 'https://github.com/FeatureIDE'
    }
}

def isGui = true
def mainClassVar = isGui ? 'de.featjar.gui.Gui' : 'de.featjar.gui.launch.FeatureModelServerLauncher'

group = 'de.featjar.gui'
version = '2.6.0-SNAPSHOT'
description = 'FeatJar-Gui-Server'

repositories {
    mavenLocal()
    mavenCentral()
}

sourceSets {
    main {
        java {
            srcDir 'src-gen'
        }
    }
}

ext {
    elkVersion = '0.8.1'
}

dependencies {
    implementation "org.eclipse.glsp:org.eclipse.glsp.server:${project.version}"
    implementation "org.eclipse.glsp:org.eclipse.glsp.server.websocket:${project.version}"
    implementation "org.eclipse.glsp:org.eclipse.glsp.layout:${project.version}"
    implementation "org.eclipse.glsp:org.eclipse.glsp.server.emf:2.5.0"
    implementation "org.eclipse.emf:org.eclipse.emf.ecore.edit:2.15.0"

    implementation("org.eclipse.emf:org.eclipse.emf.edit:2.23.0")

    implementation("org.eclipse.elk:org.eclipse.elk.alg.layered:${elkVersion}") {
        exclude group: 'log4j', module: 'log4j'
    }
}

application {
    mainClass = mainClassVar
}

tasks.named('jar') {
    manifest {
        attributes(
            'Main-Class': mainClassVar
        )
    }
}

tasks.named('shadowJar', com.github.jengelman.gradle.plugins.shadow.tasks.ShadowJar) {
    dependsOn tasks.named('classes')

    archiveClassifier.set('all')

    from(sourceSets.main.output)
    configurations = [project.configurations.runtimeClasspath]

    manifest {
        attributes(
            'Main-Class': mainClassVar,
            'Multi-Release': 'true'
        )
    }

    append('plugin.properties')
    mergeServiceFiles()
}

tasks.named('build') {
    dependsOn tasks.named('shadowJar')
}
